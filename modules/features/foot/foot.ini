# -*- conf -*-
# Migrated from wezterm config.lua

# Font: primary + fallback chain
# Foot doesn't support per-font scaling, so fallback fonts use size=10.5 (75% of 14)
font=Maple Mono:size=13, Noto Color Emoji:size=10.5, Symbols Nerd Font Mono:size=10.5, Powerline Extra Symbols:size=10.5, codicon:size=10.5, Noto Sans Symbols:size=10.5, Noto Sans Symbols2:size=10.5, Font Awesome 6 Free:size=10.5

initial-window-size-chars=160x48
pad=4x2

# include=/path/to/local.ini

[scrollback]
lines=10000

[cursor]
style=block
blink=yes

[mouse]
hide-when-typing=no

[url]
launch=xdg-open ${url}
# Extended regex: default foot URL regex, plus numeric IP and localhost URLs.
# Foot uses POSIX Extended Regular Expressions.
# This adds support for http://127.0.0.1:8000/... and http://localhost:3000/...
regex=(((https?://|mailto:|ftp://|file:|ssh:|ssh://|git://|tel:|magnet:|ipfs://|ipns://|gemini://|gopher://|news:)|www\.)([0-9a-zA-Z:/?#@!$&*+,;=.~_%^\-]+|\([]\["0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*\)|\[[\(\)"0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*\]|"[]\[\(\)0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*"|'[]\[\(\)0-9a-zA-Z:/?#@!$&*+,;=.~_%^\-]*')+([0-9a-zA-Z/#@$&*+=~_%^\-]|\([]\["0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*\)|\[[\(\)"0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*\]|"[]\[\(\)0-9a-zA-Z:/?#@!$&'*+,;=.~_%^\-]*"|'[]\[\(\)0-9a-zA-Z:/?#@!$&*+,;=.~_%^\-]*')|(https?://([0-9]{1,3}\.){3}[0-9]{1,3}(:[0-9]+)?(/[^ ]*)?)|(https?://localhost(:[0-9]+)?(/[^ ]*)?))

[regex:hashes]
regex=([a-f0-9]{6,})
launch=sh -c 'echo "${match}" | wl-copy'

[regex:paths]
regex=(~?[./][a-zA-Z0-9_./-]+[a-zA-Z0-9_/-])

