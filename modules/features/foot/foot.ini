[csd]
# "server" lets the compositor decide: Sway hides decorations for tiled
# windows, Plasma/KWin draws its own server-side decorations.
preferred=server

[key-bindings]
# Free up Ctrl+Shift+U from unicode-input so we can use it for scrolling
unicode-input=none

# Scroll half-page (matches wezterm Ctrl+Shift+U/D)
scrollback-up-half-page=Control+Shift+u
scrollback-down-half-page=Control+Shift+d

# Open scrollback in nvim (Ctrl+Shift+E)
pipe-scrollback=[sh -c "f=$(mktemp); cat - > $f && foot nvim $f; rm -f $f"] Control+Shift+e

# Show URLs with jump labels and open in browser (Ctrl+Shift+O)
show-urls-launch=Control+Shift+o

# Search for git hashes (Ctrl+Shift+H)
regex-launch=[hashes] Control+Shift+h

# Select file paths and copy to clipboard (Ctrl+Shift+Space)
regex-copy=[paths] Control+Shift+space

# Disable Ctrl+Shift+N (spawn-terminal) and Ctrl+Shift+P
spawn-terminal=none
noop=Control+Shift+p

